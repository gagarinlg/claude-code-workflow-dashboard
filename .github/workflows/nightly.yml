name: Nightly

# Publishes a Marketplace/Open VSX *pre-release* build once a day, but only when
# there have been new commits in the last 24h. Pre-releases are installed only by
# users who opt into "Pre-Release" for the extension; stable users are unaffected.
#
# The nightly version is <major>.<minor>.<YYYYMMDDHH> (e.g. 0.4.2026062705) so it
# always sorts above the current stable patch and increases monotonically.
# package.json is bumped on disk by `npm version --no-git-tag-version` but the
# change is never committed or pushed — it exists only in the runner ephemeral
# workspace for the duration of this job.
#
# Reuses the same secrets as the release workflow: VSCE_PAT (required) and
# OVSX_PAT (optional).

on:
  schedule:
    - cron: "0 5 * * *" # 05:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly:
    name: Publish pre-release
    runs-on: ubuntu-latest
    env:
      # Non-secret boolean flag: 'true' when the OVSX_PAT secret is set.
      # OVSX_PAT itself is NOT exposed here — it is scoped only to the
      # 'Publish to Open VSX (pre-release)' step env block. The flag is used
      # in the step's if: condition (secrets context is unavailable there).
      HAS_OVSX_PAT: ${{ secrets.OVSX_PAT != '' }}
    steps:
      # Pinned to commit SHA to prevent supply-chain attacks on Marketplace token.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0 # need history to detect new commits

      - name: Skip if no new commits in the last 24h
        id: check
        run: |
          if [ -z "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "No new commits in the last 24h; skipping nightly."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: 22
          # npm caching omitted intentionally — nightly runs are infrequent and
          # always publish fresh artifacts; caching is not worth the complexity.

      - name: Install tooling
        if: steps.check.outputs.skip != 'true'
        # Pinned to exact versions to prevent supply-chain attacks: a compromised or
        # future-malicious version of these tools could exfiltrate VSCE_PAT at publish time.
        run: npm install -g @vscode/vsce@3.3.2 ovsx@0.9.4

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Lint
        if: steps.check.outputs.skip != 'true'
        run: npm run lint

      - name: Type-check
        if: steps.check.outputs.skip != 'true'
        run: npm run typecheck

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: npm run build

      - name: Test with coverage (90 % gate on src/data/**, src/webview/**, and src/export/**)
        if: steps.check.outputs.skip != 'true'
        run: npm run coverage

      - name: Set nightly pre-release version
        if: steps.check.outputs.skip != 'true'
        run: |
          BASE="$(node -p "require('./package.json').version")"
          MAJORMINOR="$(echo "$BASE" | cut -d. -f1,2)"
          STAMP="$(date -u +%Y%m%d%H)"
          NIGHTLY="${MAJORMINOR}.${STAMP}"
          echo "Publishing nightly pre-release $NIGHTLY"
          npm version --no-git-tag-version "$NIGHTLY"

      - name: Validate nightly version format
        if: steps.check.outputs.skip != 'true'
        run: |
          NIGHTLY="$(node -p "require('./package.json').version")"
          if ! echo "$NIGHTLY" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]{10}$'; then
            echo "::error::Unexpected nightly version format: $NIGHTLY (expected MAJOR.MINOR.YYYYMMDDHH)"
            exit 1
          fi
          STAMP="$(echo "$NIGHTLY" | cut -d. -f3)"
          EXPECTED_YEAR=$(date -u +%Y)
          STAMP_YEAR=$(echo "$STAMP" | cut -c1-4)
          if [ "$STAMP_YEAR" -lt "$((EXPECTED_YEAR - 1))" ]; then
            echo "::error::Nightly stamp $STAMP is implausibly old (year $STAMP_YEAR < expected ~$EXPECTED_YEAR) — possible clock anomaly on runner"
            exit 1
          fi

      - name: Package (pre-release)
        if: steps.check.outputs.skip != 'true'
        run: vsce package --pre-release --out claude-code-workflow-dashboard.vsix

      - name: Publish to VS Code Marketplace (pre-release)
        if: steps.check.outputs.skip != 'true'
        env:
          # Pass the token as an env var so it does not appear in /proc/<pid>/cmdline.
          # vsce reads VSCE_PAT from the environment when -p is not supplied.
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish --pre-release --packagePath claude-code-workflow-dashboard.vsix

      - name: Publish to Open VSX (pre-release)
        if: steps.check.outputs.skip != 'true' && env.HAS_OVSX_PAT == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        # ovsx reads OVSX_PAT from the environment when -p is not supplied.
        run: ovsx publish claude-code-workflow-dashboard.vsix --pre-release

      - name: Upload VSIX artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: nightly-vsix
          path: claude-code-workflow-dashboard.vsix
          if-no-files-found: error
