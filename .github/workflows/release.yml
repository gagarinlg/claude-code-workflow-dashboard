name: Release

# Publishes the extension when a version tag is pushed, e.g.:
#   git tag v0.4.0 && git push origin v0.4.0
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   VSCE_PAT  - Azure DevOps Personal Access Token for the VS Code Marketplace
#               publisher "malte-langermann" (Marketplace > Manage > Publish scope).
#   OVSX_PAT  - (optional) Open VSX access token; skip the ovsx step if unset.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    name: Publish to Marketplace & Open VSX
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install tooling
        run: npm install -g @vscode/vsce ovsx

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Package extension
        run: vsce package --out claude-code-workflow-dashboard.vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish --packagePath claude-code-workflow-dashboard.vsix -p "$VSCE_PAT"

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: ovsx publish claude-code-workflow-dashboard.vsix -p "$OVSX_PAT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: claude-code-workflow-dashboard.vsix
          generate_release_notes: true
