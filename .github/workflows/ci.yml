name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Validate & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install vsce
        run: npm install -g @vscode/vsce

      # The extension is plain JS with no build step; this validates the
      # manifest and produces an installable VSIX as a build artifact.
      - name: Package extension
        run: vsce package --out claude-code-workflow-dashboard.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: claude-code-workflow-dashboard.vsix
          if-no-files-found: error
